            const TO = "security@telegram.org, abuse@telegram.org, reports@telegram.org, stopCA@telegram.org, dmca@telegram.org";

            // ===== عناصر DOM =====
            const deviceBadge = document.getElementById('deviceBadge');
            const linkDisplay = document.getElementById('linkDisplay');
            const manualBtn = document.getElementById('manualBtn');
            const templateBadge = document.getElementById('templateBadge');
            const statusEl = document.getElementById('status');
            const androidBadge = document.getElementById('androidBadge');

            // ===== توابع =====
            function encode(s) {
                return encodeURIComponent(s);
            }

            // ===== تشخیص دستگاه =====
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /android/i.test(userAgent);
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

            // ===== انتخاب تصادفی قالب =====
            const randomIndex = Math.floor(Math.random() * TEMPLATES.length);
            const selected = TEMPLATES[randomIndex];

            // ===== ساخت لینک‌ها =====

            // ۱. mailto اصلی (برای fallback)
            const mailtoLink = `mailto:${TO}?subject=${encode(selected.subject)}&body=${encode(selected.body)}`;

            // ۲. intent:// برای اندروید (متد موفق)
            const androidIntent = `intent://#Intent;scheme=mailto;package=com.google.android.gm;action=android.intent.action.SENDTO;S.browser_fallback_url=${encode(mailtoLink)};end`;

            // ۳. وب‌سایت جیمیل برای آیفون و کامپیوتر
            const webLink = `https://mail.google.com/mail/u/0/?to=${encode(TO)}&su=${encode(selected.subject)}&body=${encode(selected.body)}&tf=cm`;

            // ===== انتخاب لینک مناسب بر اساس دستگاه =====
            let deviceLink = webLink;
            let deviceName = "کامپیوتر / آیفون";

            if (isAndroid) {
                deviceLink = androidIntent;
                deviceName = "اندروید (جیمیل)";
                androidBadge.style.display = 'block';
            } else if (isIOS) {
                deviceLink = webLink;
                deviceName = "آیفون/آیپد (وب‌سایت جیمیل)";
                androidBadge.style.display = 'none';
            } else {
                deviceLink = webLink;
                deviceName = "کامپیوتر (وب‌سایت جیمیل)";
                androidBadge.style.display = 'none';
            }

            // ===== نمایش اطلاعات =====
            deviceBadge.textContent = `📱 دستگاه: ${deviceName}`;
            templateBadge.textContent = `📌 قالب انتخاب شده: ${selected.name}`;
            linkDisplay.textContent = deviceLink;
            statusEl.textContent = `✅ انتقال به جیمیل با قالب "${selected.name}" ...`;

            // ================================================
            // ===== ✅ هدایت خودکار به جیمیل (بدون کلیک) =====
            // ================================================

            // روش ۱: هدایت مستقیم بعد از ۱.۲ ثانیه
            setTimeout(function() {
                try {
                    // برای اندروید از روش مخصوص استفاده می‌کنیم
                    if (isAndroid) {
                        // با intent:// مستقیم بریم
                        window.location.href = deviceLink;
                    } else {
                        // برای سایر دستگاه‌ها در تب جدید باز کن
                        window.open(deviceLink, '_blank', 'noopener,noreferrer');
                    }
                    statusEl.textContent = `✅ جیمیل با قالب "${selected.name}" باز شد!`;
                } catch (e) {
                    statusEl.textContent = '⚠️ خطا در انتقال. از دکمه دستی استفاده کن.';

            manualBtn.addEventListener('click', function() {

                statusEl.textContent = '✅ جیمیل در حال باز شدن ...';
