<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گزارش‌ساز خودکار - @taemZarathust</title>
    <style>
        * { box-sizing: border-box; margin: 0; }
        body {
            background: #0a0e17;
            color: #e7edf9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
            text-align: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #111827;
            padding: 40px 28px;
            border-radius: 28px;
            border: 1px solid #1e293b;
        }
        h1 {
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 12px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p {
            color: #94a3b8;
            font-size: 16px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 32px;
            background: #2563eb;
            color: #fff;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        .info {
            margin-top: 20px;
            padding: 12px 16px;
            background: #1e293b;
            border-radius: 12px;
            font-size: 13px;
            color: #94a3b8;
            word-break: break-all;
        }
        .info strong {
            color: #e2e8f0;
        }
        .fallback {
            margin-top: 16px;
            padding: 12px 16px;
            background: #1e293b;
            border-radius: 12px;
            font-size: 13px;
            color: #fcd34d;
            border-right: 4px solid #f59e0b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 گزارش‌ساز خودکار</h1>
        <p>در حال انتقال به برنامه جیمیل ...</p>
        <div class="spinner"></div>
        <p id="status" style="color: #60a5fa;">⏳ در حال آماده‌سازی ...</p>

        <button class="btn" id="manualBtn">🔄 باز کردن دستی جیمیل</button>

        <div class="info">
            <strong>🔗 لینک تشخیص داده شده:</strong> <span id="linkDisplay">در حال ساخت ...</span>
        </div>

        <div class="fallback">
            💡 <strong>راه جایگزین:</strong>
            اگر برنامه جیمیل باز نشد، روی دکمه بالا کلیک کن.
            <br>
            <small>🔒 ارسال خودکار ممکن نیست. فقط دکمه Send رو بزن.</small>
        </div>
    </div>

    <script>
        (function() {
            // ===== اطلاعات ایمیل =====
            const FIXED_TO = "security@telegram.org, abuse@telegram.org, reports@telegram.org, stopCA@telegram.org, dmca@telegram.org";
            const SUBJECT = "URGENT: Doxxing and Hacking Threats – Immediate Action Required @taemZarathust";
            const BODY = `Dear Telegram Abuse Team,

I am writing to report a serious and ongoing case of doxxing, unauthorized publication of private personal information, and threats of hacking on the Telegram channel @taemZarathust.

This channel is systematically sharing private phone numbers, personal identities, and sensitive information belonging to individuals without their consent. The channel administrator has made explicit threats to hack and compromise the accounts of targeted individuals.

Threatening messages:
https://t.me/taemZarathust/925
https://t.me/taemZarathust/916
https://t.me/taemZarathust/902
https://t.me/taemZarathust/900?single

Additional evidence:
https://t.me/taemZarathust/882
https://t.me/taemZarathust/880
https://t.me/taemZarathust/879?single

Channel link: https://t.me/taemZarathust

I respectfully ask Telegram to investigate this activity and take strong, permanent action under its policies, including:

1. Permanently removing the channel @taemZarathust and all content used to distribute private personal information and threats.
2. Permanently restricting the accounts responsible for this activity.
3. Investigating any associated accounts or channels that may be used to continue this activity if the main channel is removed.
4. Taking additional technical measures available to Telegram to prevent the continued abuse and immediate re-creation of this channel.
5. Reviewing the attached evidence and the links above, which show examples of the threats and private information being publicly exposed.

This is not a routine complaint. People are at risk of real harm from this activity. I understand that Telegram must investigate reports carefully, but I sincerely ask that this case be treated with urgency given the combination of doxxing and explicit hacking threats.

I would greatly appreciate confirmation that this report has been received and that the matter is being investigated. If additional information or evidence is required, I am willing to provide it.

Thank you for taking the time to review this report. I sincerely hope Telegram will take this matter seriously and act quickly to protect the privacy and safety of the people affected.`;

            // ===== عناصر DOM =====
            const statusEl = document.getElementById('status');
            const linkDisplay = document.getElementById('linkDisplay');
            const manualBtn = document.getElementById('manualBtn');

            // ===== توابع کمکی =====
            function encode(s) {
                return encodeURIComponent(s);
            }

            // ===== تشخیص دستگاه =====
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /android/i.test(userAgent);
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

            // ===== ساخت لینک‌ها =====
            // ۱. لینک mailto: (همیشه کار می‌کنه، ولی برنامه رو تشخیص می‌ده)
            const mailtoLink = `mailto:${FIXED_TO}?subject=${encode(SUBJECT)}&body=${encode(BODY)}`;

            // ۲. لینک مخصوص دستگاه
            let deviceLink = mailtoLink;
            let deviceName = "ایمیل پیش‌فرض";

            if (isAndroid) {
                // ✅ اندروید: intent://
                deviceLink = `intent://#Intent;scheme=googlegmail;package=com.google.android.gm;action=android.intent.action.SENDTO;S.browser_fallback_url=${encode(mailtoLink)};end`;
                deviceName = "جیمیل (اندروید)";
            } else if (isIOS) {
                // ✅ آیفون: googlegmail://
                deviceLink = `googlegmail:///co?to=${encode(FIXED_TO)}&su=${encode(SUBJECT)}&body=${encode(BODY)}`;
                deviceName = "جیمیل (iOS)";
            } else {
                // ✅ کامپیوتر: mailto:
                deviceLink = mailtoLink;
                deviceName = "ایمیل پیش‌فرض (دسکتاپ)";
            }

            // ===== نمایش لینک =====
            linkDisplay.textContent = deviceLink;
            statusEl.textContent = `✅ تشخیص: ${deviceName} - در حال انتقال ...`;

            // ===== هدایت خودکار =====
            setTimeout(function() {
                try {
                    window.location.href = deviceLink;
                    statusEl.textContent = `✅ انتقال به ${deviceName} انجام شد!`;
                } catch(e) {
                    statusEl.textContent = '⚠️ خطا در انتقال. از دکمه دستی استفاده کن.';
                    console.error('خطا:', e);
                }
            }, 1200);

            // ===== باز کردن دستی =====
            manualBtn.addEventListener('click', function() {
                const currentLink = linkDisplay.textContent;
                if (currentLink && currentLink.startsWith('intent://') || currentLink.startsWith('googlegmail://') || currentLink.startsWith('mailto:')) {
                    window.location.href = currentLink;
                    statusEl.textContent = '✅ لینک در حال باز شدن ...';
                } else {
                    alert('لینک هنوز ساخته نشده است.');
                }
            });

        })();
    </script>
</body>
</html>
